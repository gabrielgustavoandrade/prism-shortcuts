<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg: #101114;
      --surface: rgba(255,255,255,0.10);
      --stroke: rgba(255,255,255,0.16);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.48);
      --purple: #a78bfa;
      --blue: #62c7ff;
    }
    html, body {
      width: 100%;
      height: 100%;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0) 50%),
        radial-gradient(130% 90% at 50% -30%, rgba(98,199,255,0.22), transparent 44%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    .container {
      width: 100%;
    }
    .input-wrap {
      position: relative;
      width: 100%;
    }
    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color 0.2s;
    }
    input {
      width: 100%;
      padding: 14px 16px 14px 42px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06)),
        var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 14px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      box-shadow:
        0 18px 44px rgba(0,0,0,0.24),
        inset 0 1px 0 rgba(255,255,255,0.18);
      -webkit-backdrop-filter: blur(24px) saturate(1.45);
      backdrop-filter: blur(24px) saturate(1.45);
    }
    input::placeholder {
      color: var(--muted);
    }
    input:focus {
      border-color: rgba(167,139,250,0.62);
      box-shadow:
        0 18px 44px rgba(0,0,0,0.24),
        0 0 0 4px rgba(167,139,250,0.16),
        inset 0 1px 0 rgba(255,255,255,0.22);
    }
    input:focus ~ svg {
      color: var(--purple);
    }
    .hint {
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.36);
    }
    kbd {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 5px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 10px;
      color: rgba(255,255,255,0.58);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="input-wrap">
      <input
        id="input"
        type="text"
        placeholder="Search or enter URL..."
        autofocus
        spellcheck="false"
        autocomplete="off"
      />
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="hint">
      <kbd>Enter</kbd> to go &nbsp;&middot;&nbsp; <kbd>Esc</kbd> to close
    </div>
  </div>
  <script src="lens.js"></script>
</body>
</html>
